<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Summary — InvoiceFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: rgba(99, 102, 241, 0.08);
      --primary-glow: rgba(99, 102, 241, 0.2);
      --accent: #8b5cf6;
      --surface: #ffffff;
      --surface-raised: #fafbfe;
      --bg: #f0f2f8;
      --text: #1a1a2e;
      --text-secondary: #4a4a6a;
      --text-muted: #8b8ba7;
      --border: #e4e7f1;
      --border-light: #eef0f6;
      --success: #10b981;
      --success-light: rgba(16, 185, 129, 0.08);
      --danger: #ef4444;
      --warning: #f59e0b;
      --chat-user: #6366f1;
      --chat-ai: #f8f9fd;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Top Nav Bar ─── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border-light);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.92);
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }

    .topbar-logo {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: -0.5px;
    }

    .topbar-title {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
    }

    .topbar-file {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .topbar-file svg { color: var(--primary); flex-shrink: 0; }

    .btn-new {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--text);
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
    }

    .btn-new:hover { background: #2d2d4a; color: white; transform: translateY(-1px); }

    /* ─── Layout ─── */
    .page-layout {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 0;
      height: calc(100vh - 63px);
    }

    @media (max-width: 900px) {
      .page-layout {
        grid-template-columns: 1fr;
        height: auto;
      }
    }

    /* ─── Summary Panel ─── */
    .summary-panel {
      padding: 32px 40px;
      overflow-y: auto;
      background: var(--surface);
    }

    .summary-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--success-light);
      color: var(--success);
      font-weight: 600;
      font-size: 0.78rem;
      padding: 5px 12px;
      border-radius: 20px;
      margin-bottom: 18px;
      border: 1px solid rgba(16,185,129,0.15);
    }

    .summary-badge svg { width: 14px; height: 14px; }

    .summary-heading {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
      color: var(--text);
    }

    .summary-content {
      font-size: 0.92rem;
      line-height: 1.8;
      color: var(--text-secondary);
    }

    .summary-content h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin: 24px 0 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
    }

    .summary-content h2:first-child { margin-top: 0; }

    .summary-content ul, .summary-content ol {
      padding-left: 18px;
      margin: 8px 0;
    }

    .summary-content li {
      margin-bottom: 6px;
      line-height: 1.7;
    }

    .summary-content strong {
      color: var(--text);
      font-weight: 600;
    }

    .summary-content p { margin-bottom: 10px; }

    .summary-content code {
      background: var(--primary-light);
      color: var(--primary-dark);
      padding: 2px 7px;
      border-radius: 5px;
      font-size: 0.88em;
    }

    /* ─── Chat Panel ─── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      background: var(--surface-raised);
      height: 100%;
    }

    .chat-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border-light);
      background: var(--surface);
    }

    .chat-header h3 {
      font-size: 0.95rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }

    .chat-header p {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .chat-header .ai-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      display: inline-block;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Messages Area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-welcome {
      text-align: center;
      padding: 32px 20px;
      color: var(--text-muted);
    }

    .chat-welcome .icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary-light), rgba(139,92,246,0.08));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
    }

    .chat-welcome .icon svg { width: 24px; height: 24px; color: var(--primary); }

    .chat-welcome h4 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .chat-welcome p { font-size: 0.82rem; line-height: 1.5; }

    .quick-questions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 16px;
    }

    .quick-q {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      font-family: inherit;
    }

    .quick-q:hover {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary-dark);
    }

    /* Message Bubbles */
    .msg {
      display: flex;
      gap: 10px;
      animation: msgIn 0.3s ease;
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      margin-top: 2px;
    }

    .msg.ai .msg-avatar {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
    }

    .msg.user .msg-avatar {
      background: var(--text);
      color: white;
    }

    .msg-body {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.88rem;
      line-height: 1.65;
    }

    .msg.ai .msg-body {
      background: var(--surface);
      border: 1px solid var(--border-light);
      color: var(--text-secondary);
      border-top-left-radius: 4px;
    }

    .msg.user .msg-body {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      border-top-right-radius: 4px;
    }

    .msg-body p { margin-bottom: 6px; }
    .msg-body p:last-child { margin-bottom: 0; }
    .msg-body strong { font-weight: 600; }
    .msg-body ul, .msg-body ol { padding-left: 16px; margin: 6px 0; }
    .msg-body li { margin-bottom: 3px; }

    .msg-body code {
      background: rgba(99,102,241,0.1);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.85em;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 14px 18px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: var(--primary);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
      opacity: 0.5;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); opacity: 1; }
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Chat Input */
    .chat-input-area {
      padding: 14px 16px;
      border-top: 1px solid var(--border-light);
      background: var(--surface);
    }

    .chat-input-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface-raised);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 4px 6px 4px 16px;
      transition: all 0.2s;
    }

    .chat-input-wrapper:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .chat-input-wrapper input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 0.88rem;
      font-family: inherit;
      color: var(--text);
      padding: 10px 0;
    }

    .chat-input-wrapper input::placeholder {
      color: var(--text-muted);
    }

    .btn-send {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-send:hover { transform: scale(1.05); }
    .btn-send:active { transform: scale(0.97); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-send svg { width: 18px; height: 18px; }

    /* Scrollbar */
    .chat-messages::-webkit-scrollbar,
    .summary-panel::-webkit-scrollbar {
      width: 5px;
    }

    .chat-messages::-webkit-scrollbar-thumb,
    .summary-panel::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    /* Mobile */
    @media (max-width: 900px) {
      .page-layout {
        grid-template-columns: 1fr;
      }
      .chat-panel {
        border-left: none;
        border-top: 1px solid var(--border);
        height: 500px;
      }
      .summary-panel { padding: 24px 20px; }
      .topbar-file { display: none; }
    }
  </style>
</head>
<body>
  <!-- Top Bar -->
  <nav class="topbar">
    <a href="/" class="topbar-brand">
      <div class="topbar-logo">IF</div>
      <span class="topbar-title">InvoiceFlow</span>
    </a>
    <div class="topbar-file">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
      <span>{{ filename }}</span>
    </div>
    <a href="/" class="btn-new">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      New Invoice
    </a>
  </nav>

  <!-- Main Layout -->
  <div class="page-layout">
    <!-- Summary Panel -->
    <div class="summary-panel">
      <div class="summary-badge">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Analysis Complete
      </div>
      <h1 class="summary-heading">Invoice Summary</h1>
      <div class="summary-content" id="summaryContent"></div>
    </div>

    <!-- Chat Panel -->
    <div class="chat-panel">
      <div class="chat-header">
        <h3>
          <span class="ai-dot"></span>
          Ask about this invoice
        </h3>
        <p>AI-powered Q&A — ask anything about the details</p>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="chat-welcome" id="chatWelcome">
          <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/></svg>
          </div>
          <h4>Ask me anything</h4>
          <p>I can answer questions about this invoice — payment details, line items, dates, and more.</p>
          <div class="quick-questions">
            <button class="quick-q" onclick="askQuick(this)">What is the total amount due?</button>
            <button class="quick-q" onclick="askQuick(this)">When is the payment deadline?</button>
            <button class="quick-q" onclick="askQuick(this)">Break down the line items for me</button>
            <button class="quick-q" onclick="askQuick(this)">Are there any late fees mentioned?</button>
          </div>
        </div>
      </div>

      <div class="chat-input-area">
        <div class="chat-input-wrapper">
          <input type="text" id="chatInput" placeholder="Ask a question about this invoice..." autocomplete="off">
          <button class="btn-send" id="sendBtn" onclick="sendMessage()" title="Send">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ─── Render Summary with Markdown ───
    const rawSummary = {{ summary | tojson }};
    document.getElementById('summaryContent').innerHTML = marked.parse(rawSummary);

    // ─── Chat State ───
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatWelcome = document.getElementById('chatWelcome');
    let chatHistory = [];
    let isWaiting = false;

    // Enter key to send
    chatInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Quick question buttons
    function askQuick(btn) {
      chatInput.value = btn.textContent;
      sendMessage();
    }

    // Add a message bubble
    function addMessage(role, content) {
      // Hide welcome on first message
      if (chatWelcome) {
        chatWelcome.style.display = 'none';
      }

      const msgDiv = document.createElement('div');
      msgDiv.className = `msg ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = role === 'ai' ? 'IF' : 'You';

      const body = document.createElement('div');
      body.className = 'msg-body';
      body.innerHTML = marked.parse(content);

      msgDiv.appendChild(avatar);
      msgDiv.appendChild(body);
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      return msgDiv;
    }

    // Show typing indicator
    function showTyping() {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'msg ai';
      msgDiv.id = 'typingIndicator';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = 'IF';

      const body = document.createElement('div');
      body.className = 'msg-body typing';
      body.innerHTML = '<span></span><span></span><span></span>';

      msgDiv.appendChild(avatar);
      msgDiv.appendChild(body);
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    // Send message
    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text || isWaiting) return;

      isWaiting = true;
      sendBtn.disabled = true;
      chatInput.value = '';

      // Add user message
      addMessage('user', text);
      chatHistory.push({ role: 'user', content: text });

      // Show typing
      showTyping();

      try {
        const historyStr = chatHistory
          .map(m => `${m.role === 'user' ? 'User' : 'AI'}: ${m.content}`)
          .join('\n');

        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: text, history: historyStr })
        });

        const data = await res.json();
        hideTyping();

        if (data.error) {
          addMessage('ai', `⚠️ ${data.error}`);
        } else {
          addMessage('ai', data.answer);
          chatHistory.push({ role: 'ai', content: data.answer });
        }
      } catch (err) {
        hideTyping();
        addMessage('ai', '⚠️ Something went wrong. Please try again.');
      }

      isWaiting = false;
      sendBtn.disabled = false;
      chatInput.focus();
    }
  </script>
</body>
</html>
